version: '3.8'

services:
  server-monitor:
    build: .
    container_name: server-monitor
    restart: always
    # Share host network namespace to monitor all host interfaces and actual network speed
    network_mode: host
    pid: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - PORT=8080
      - PANEL_USERNAME=admin
      - PANEL_PASSWORD=admin  # Choose a secure password for your panel
      - PROCFS_PATH=/host/proc
      # Uncomment to use PostgreSQL database instead of default SQLite metrics.db
      # - MONITOR_DB_DSN=postgresql://username:password@localhost:5432/server_monitor
    volumes:
      # Mount host's proc filesystem to monitor host CPU, RAM, and active processes
      - /proc:/host/proc:ro
      # Mount host's sys filesystem to monitor real-time disk activity
      - /sys:/host/sys:ro
      # Persist historical database across container restarts
      - ./metrics.db:/app/metrics.db
      # Mount X-UI directories for dynamic path resolution (read-only)
      - /etc/x-ui:/etc/x-ui:ro
      - /var/log:/var/log:ro
      - /usr/local/x-ui:/usr/local/x-ui:ro
      - /opt/x-ui:/opt/x-ui:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
